services:
  # 1. THE VAULT: PostgreSQL + pgvector
  db:
    image: ankane/pgvector:latest
    container_name: diary-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-digital_diary}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - db-bridge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-digital_diary}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. THE GATEKEEPER: Your Python API
  app:
    build: .
    container_name: diary-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - db-bridge
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-digital_diary}
      - AI_PROVIDER=google
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 2G

networks:
  db-bridge:
    driver: bridge

volumes:
  postgres_data:
